<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NDC26 큐카드">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fbfaf7">
<title>NDC26 데이터 대담 · 모더레이터 큐카드</title>
<style>
  :root{
    --ink:#1a1a1a; --muted:#7a7a7a; --gold:#b08a3e;
    --bg:#fbfaf7; --card:#ffffff; --line:#e9e4d8;
    --me:#0a3d62; --me-bg:#eef4f8;
    --q-ryu:#1f6e43; --q-bae:#9a4a1f; --q-im:#6b2d8a; --q-all:#444;
    --fs:1; /* font scale multiplier */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"SF Pro","Apple SD Gothic Neo","Pretendard",sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior:none;}
  body{display:flex; flex-direction:column;}

  /* top bar */
  .bar{flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:10px 16px; padding-top:calc(10px + env(safe-area-inset-top));
    background:var(--card); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:10;}
  .bar .title{font-size:15px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar .spacer{flex:1;}
  .bar .clock{font-variant-numeric:tabular-nums; font-weight:800; font-size:18px; color:var(--gold);
    cursor:pointer; padding:4px 12px; border-radius:10px; border:1px solid var(--line); white-space:nowrap;}
  .bar .clock:active{background:#f1ede2;}
  .bar .clock.run{color:#1a7a3a; border-color:#bfe3c8; background:#f0f8f2;}
  .bar .clock.warn{color:#c46a16; border-color:#ecd2ad; background:#fbf3e6;}
  .bar .clock.over{color:#c0392b; border-color:#ecc0ba; background:#fbeae8;}
  .fsbtn{border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px;
    width:40px; height:40px; font-size:18px; font-weight:700; cursor:pointer;}
  .fsbtn:active{background:#f1ede2;}

  /* progress dots */
  .dots{flex:0 0 auto; display:flex; gap:6px; justify-content:flex-start;
    padding:8px 14px; background:var(--card); border-bottom:1px solid var(--line);
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .dots::-webkit-scrollbar{display:none;}
  .dot{flex:0 0 auto; font-size:13px; color:var(--muted); padding:5px 11px; border-radius:999px; border:1px solid var(--line); cursor:pointer; white-space:nowrap; font-weight:600;}
  .dot.active{background:var(--gold); color:#fff; border-color:var(--gold); font-weight:700;}

  /* page area */
  .stage{flex:1 1 auto; position:relative; overflow:hidden;}
  .track{display:flex; height:100%; transition:transform .25s ease;}
  .page{flex:0 0 100%; height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:22px 26px 120px;}

  .kicker{font-size:calc(15px*var(--fs)); color:var(--muted); letter-spacing:.5px; margin:0 0 4px;}
  .h{font-size:calc(30px*var(--fs)); font-weight:800; margin:0 0 4px; line-height:1.25;}
  .time{font-size:calc(17px*var(--fs)); color:var(--gold); font-weight:700; margin:0 0 18px;}
  .gold-rule{height:2px; background:var(--gold); opacity:.5; border:0; margin:0 0 20px;}

  /* moderator lines (read aloud) */
  .me{background:var(--me-bg); border-left:5px solid var(--me); border-radius:8px;
    padding:16px 18px; margin:0 0 18px;}
  .me .tag{font-size:calc(14px*var(--fs)); font-weight:800; color:var(--me); margin:0 0 6px; letter-spacing:.3px;}
  .me p{margin:0 0 8px; font-size:calc(22px*var(--fs)); line-height:1.55; font-weight:500;}
  .me p:last-child{margin-bottom:0;}

  /* questions */
  .q{display:flex; align-items:flex-start; gap:14px;
    padding:16px 18px; margin:0 0 14px; border-radius:10px; background:var(--card);
    border:1px solid var(--line); border-left:8px solid var(--q-all);}
  .q .who{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:calc(64px*var(--fs)); padding:8px 10px; border-radius:10px; color:#fff;}
  .q .who .nm{font-size:calc(20px*var(--fs)); font-weight:900; line-height:1.15; white-space:nowrap;}
  .q .who .org{font-size:calc(11px*var(--fs)); font-weight:600; opacity:.85; margin-top:3px; white-space:nowrap;}
  .q .qt{flex:1 1 auto; margin:0; font-size:calc(22px*var(--fs)); line-height:1.55; font-weight:500; align-self:center;}
  .q.ryu{border-left-color:var(--q-ryu);} .q.ryu .who{background:var(--q-ryu);}
  .q.bae{border-left-color:var(--q-bae);} .q.bae .who{background:var(--q-bae);}
  .q.im{border-left-color:var(--q-im);}  .q.im  .who{background:var(--q-im);}

  /* 공통질문 — clearly different: full gold band, ALL-panel marker */
  .q.all{flex-direction:column; gap:10px; border:2px dashed var(--gold); border-left:8px solid var(--gold);
    background:#fbf6ea;}
  .q.all .who{flex-direction:row; gap:8px; align-self:stretch; justify-content:center; width:100%;
    background:var(--gold); padding:8px 12px;}
  .q.all .who .nm{font-size:calc(17px*var(--fs)); letter-spacing:.5px;}
  .q.all .who .org{display:none;}
  .q.all .qt{align-self:auto;}

  .note{font-size:calc(15px*var(--fs)); color:var(--muted); margin:18px 0 0; line-height:1.5;}
  .av{font-size:calc(14px*var(--fs)); color:var(--muted); background:#f4f1e9; border-radius:8px;
    padding:10px 14px; margin:14px 0 0; line-height:1.5;}
  .av b{color:#8a7a4a;}

  /* tap zones for page turn (sit above page, below nav buttons) */
  .tapzone{position:absolute; top:0; bottom:0; width:22%; z-index:5; background:transparent;}
  .tapzone.left{left:0;} .tapzone.right{right:0;}
  .edgehint{position:absolute; top:50%; transform:translateY(-50%); z-index:6; pointer-events:none;
    font-size:34px; font-weight:800; color:var(--gold); opacity:.22; user-select:none;}
  .edgehint.left{left:10px;} .edgehint.right{right:10px;}

  /* nav arrows (backup, smaller, lower-profile) */
  .nav{position:absolute; bottom:18px; left:0; right:0; display:flex; justify-content:space-between;
    padding:0 18px; pointer-events:none; z-index:7;}
  .nav button{pointer-events:auto; border:0; background:var(--ink); color:#fff; opacity:.5;
    border-radius:999px; height:42px; min-width:42px; padding:0 14px; font-size:15px; font-weight:700;
    box-shadow:0 2px 10px rgba(0,0,0,.14); cursor:pointer;}
  .nav button:active{opacity:1;}
  .nav button:disabled{opacity:.2;}

  .pageno{position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    font-size:14px; color:var(--muted); font-weight:700; pointer-events:none;}
</style>
</head>
<body>
  <div class="bar">
    <span class="title">NDC26 데이터 대담 · 6/17(수) 14:30</span>
    <span class="spacer"></span>
    <span class="clock" id="clock" title="탭하면 시작 / 길게(더블탭) 리셋">▶ 70:00</span>

    <div class="nav">
      <button id="prev">‹</button>
      <button id="next">›</button>

    <div class="pageno" id="pageno"></div>

      {me:['오늘은 AI 시대에 데이터가 왜 다시 핵심 자산이 되는지,',
           '그리고 넥슨이 모노레이크를 통해 어떤 데이터 기반을 준비하고 있는지 함께 이야기 나눴습니다.',
           '귀한 이야기 나눠주신 패널 여러분께 큰 박수 부탁드립니다. 감사합니다.']},
      {note:'이후 사회자가 설문 QR 안내 → 다음 세션 브릿지로 전환.'}
    ]
  }
];

const track = document.getElementById('track');
const dots  = document.getElementById('dots');
let idx = 0;

function esc(s){return s;}

const WHO = {
  ryu: {nm:'류청훈', org:'기술본부장'},
  bae: {nm:'배준영', org:'플랫폼본부장'},
  im:  {nm:'임진식', org:'SE총괄'},
};

PAGES.forEach((pg,i)=>{
  const p = document.createElement('div'); p.className='page';
  let html = `<p class="kicker">${pg.kick}</p><h1 class="h">${pg.h}</h1><p class="time">${pg.time}</p><hr class="gold-rule">`;
  pg.blocks.forEach(b=>{
    if(b.me){ html += `<div class="me"><div class="tag">▶ 내가 말한다</div>${b.me.map(x=>`<p>${x}</p>`).join('')}</div>`; }
    else if(b.q){
      if(b.cls==='all'){
        const label = b.who || '공통 질문';
        html += `<div class="q all"><span class="who"><span class="nm">◆ ${label} · 세 분 모두</span></span><p class="qt">${b.q}</p></div>`;
      } else {
        const w = WHO[b.cls] || {nm:b.who, org:''};
        html += `<div class="q ${b.cls}"><span class="who"><span class="nm">${w.nm}</span><span class="org">${w.org}</span></span><p class="qt">${b.q}</p></div>`;
      }
    }
    else if(b.av){ html += `<div class="av">${b.av}</div>`; }
    else if(b.note){ html += `<p class="note">※ ${b.note}</p>`; }
  });
  p.innerHTML = html;
  track.appendChild(p);

  const d = document.createElement('div'); d.className='dot';
  d.textContent = pg.nav || pg.kick.split('·')[0].trim().split(' ')[0];
  d.onclick=()=>go(i);
  dots.appendChild(d);
});

function go(n){
  idx = Math.max(0, Math.min(PAGES.length-1, n));
  track.style.transform = `translateX(-${idx*100}%)`;
  [...dots.children].forEach((d,i)=>d.classList.toggle('active', i===idx));
  const ad = dots.children[idx]; if(ad) ad.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  document.getElementById('prev').disabled = idx===0;
  document.getElementById('next').disabled = idx===PAGES.length-1;
  document.getElementById('pageno').textContent = `${idx+1} / ${PAGES.length}`;
  const cur = track.children[idx]; if(cur) cur.scrollTop = 0;
}
document.getElementById('prev').onclick=()=>go(idx-1);
document.getElementById('next').onclick=()=>go(idx+1);
document.getElementById('tapL').onclick=()=>go(idx-1);
document.getElementById('tapR').onclick=()=>go(idx+1);

// swipe
let sx=0, sy=0, swiping=false;
track.addEventListener('touchstart',e=>{sx=e.touches[0].clientX; sy=e.touches[0].clientY; swiping=true;},{passive:true});
track.addEventListener('touchend',e=>{
  if(!swiping) return; swiping=false;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.4){ dx<0?go(idx+1):go(idx-1); }
},{passive:true});

// font scale
let fs=1.0;
function applyFs(){document.documentElement.style.setProperty('--fs', fs.toFixed(2));}
document.getElementById('fsup').onclick=()=>{fs=Math.min(1.6, fs+0.1); applyFs();};
document.getElementById('fsdown').onclick=()=>{fs=Math.max(0.8, fs-0.1); applyFs();};

// countdown timer — session is 70 min (14:30–15:40)
const TOTAL = 70*60; // seconds
let remain = TOTAL, running = false, timerId = null;
const clk = document.getElementById('clock');

function fmt(s){
  const neg = s < 0; s = Math.abs(s);
  const m = Math.floor(s/60), ss = s%60;
  return (neg?'+':'') + String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function paint(){
  clk.classList.remove('run','warn','over');
  if(!running && remain===TOTAL){ clk.textContent = '▶ ' + fmt(remain); return; }
  clk.textContent = (running?'':'⏸ ') + fmt(remain);
  if(remain <= 0) clk.classList.add('over');
  else if(remain <= 5*60) clk.classList.add('warn');
  else if(running) clk.classList.add('run');
}
function tickTimer(){ remain -= 1; paint(); }
function start(){ if(timerId) return; running=true; timerId=setInterval(tickTimer,1000); paint(); }
function pause(){ running=false; if(timerId){clearInterval(timerId); timerId=null;} paint(); }
function reset(){ pause(); remain=TOTAL; paint(); }

// single tap: start/pause toggle.  double tap: reset.
let lastTap=0;
clk.addEventListener('click', ()=>{
  const now=Date.now();
  if(now-lastTap < 350){ reset(); lastTap=0; return; }
  lastTap=now;
  setTimeout(()=>{ if(Date.now()-lastTap>=350){ running?pause():start(); } }, 360);
});
paint();

go(0);
</script>
</body>
</html>
